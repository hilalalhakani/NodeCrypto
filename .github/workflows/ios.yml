name: iOS Build and Test
on:
  push:
    branches: [] #[ main, develop ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      # 1. Checkout repository with fetch-depth (reduced from 0 to 1 for faster checkout)
      - name: Checkout repository
        uses: actions/checkout@v4.1.1
        
      - name: List available simulators
        run: xcrun simctl list devices

      # 2. Setup Xcode (kept, but consider pinning a version for stability)
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Enable macros
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      # 3. Cache Dependencies (improved caching strategy)
      - name: Restore package cache
        uses: actions/cache@v4
        id: packages-cache
        with:
          path: packages_cache
          key: ${{ runner.os }}-packages-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-packages-

      # 4. Install SwiftLint (consider moving to a dependency manager like Carthage or SPM for SwiftLint)
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run tests
        run: |
          # Find iPhone 17 (strictly) available on iOS 26.0 or above
          DESTINATION=$(xcrun simctl list devices available | grep -E "iPhone 17\s+\(" | head -n 1 | sed -E 's/.*\(([-0-9A-F]+)\).*/id=\1/')
          
          if [ -z "$DESTINATION" ]; then
            echo "❌ No available iOS simulator found"
            exit 1
          fi
          
          echo "🚀 Testing on destination: $DESTINATION"
          
          PACKAGES_PATH="packages_cache"
          XCODEBUILD_FLAGS=(
            test
            -scheme NodeCrypto
            -project NodeCrypto/NodeCrypto.xcodeproj
            -clonedSourcePackagesDirPath "$PACKAGES_PATH"
            -destination "$DESTINATION"
            -disableAutomaticPackageResolution
          )
          
          if [ "$HAS_PACKAGES_CACHE_HIT" = "true" ]; then
             echo "🎉 Using cached dependencies"
             XCODEBUILD_FLAGS+=(-skipPackageUpdates)
          fi
          
          set -o pipefail && xcrun xcodebuild "${XCODEBUILD_FLAGS[@]}" | xcbeautify --renderer github-actions
        env:
          HAS_PACKAGES_CACHE_HIT: ${{ steps.packages-cache.outputs.cache-hit == 'true' }}

      # Save package cache after tests
      - name: Save package cache
        uses: actions/cache@v4
        with:
          path: packages_cache
          key: ${{ runner.os }}-packages-${{ hashFiles('**/Package.resolved') }}
